# Manual overrides for fields that can't be obtained from any official-or-
# sanctioning-body source. The fallback chain (native scraper → World
# Athletics → AIMS) runs first; whatever's left blank can be filled here
# with an explicit citation. Cite the source so the report's provenance
# is auditable.
#
# Only fields explicitly listed here override; all others stay blank if
# scraping didn't fill them. Adding a key like `<field>_source` next to a
# value attaches a citation to the audit log (printed in `notes`).
#
# Supported field names match RaceFacts attributes:
#   inception_year, edition,
#   finishers_total, finishers_men_pct, finishers_women_pct, finishers_nonbinary_pct,
#   spectators, volunteers, prize_money_usd,
#   organizers, title_sponsor, other_sponsors
#
# Example (uncomment to apply):
#
# istanbul-half-marathon:
#   finishers_total: 19000
#   finishers_total_source: "AIMS Distance Running, 'Double triumph in Istanbul', 20 Apr 2026"
#   spectators: 50000
#   spectators_source: "İBB Spor İstanbul press release, 2024 edition"

# (intentionally empty — populate as Santosh confirms specific facts)


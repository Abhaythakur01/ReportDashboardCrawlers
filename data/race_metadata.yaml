# Race-level metadata for cross-cutting fallbacks.
#
# Each race is keyed by race_id (the slug used in race_urls.json).
# Fields:
#   wa_competition_id : Latest known World Athletics competition ID for the
#                       race. Used as a podium/elite-results fallback when
#                       the official scraper can't extract them. Bump to
#                       the current year's ID once WA publishes it; the
#                       fallback then auto-updates the report.
#   aims_race_id      : aims-worldrunning.org/races/<id>.html for the
#                       AIMS member entry. Used as a finisher-count fallback
#                       via that race's recap article in Distance Running.
#
# WA IDs collected from the WA Label Road Races calendar (2026 season).
# When a race hasn't yet run, the WA fallback returns nothing silently.

